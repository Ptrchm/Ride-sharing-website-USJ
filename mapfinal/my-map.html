<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>USJ RideShare - My Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    :root {
      --accent: #0072bb;
      --accent-dark: #002b59;
      --ink: #0f172a;
      --muted: #55606a;
      --border: rgba(0, 43, 89, 0.12);
      --panel-bg: rgba(255, 255, 255, 0.95);
      --header-h: 62px;
      --radius: 14px;
      --shadow: 0 10px 28px rgba(0, 43, 89, 0.14);
      --font: Inter, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      font-family: var(--font);
      color: var(--ink);
      background: linear-gradient(180deg, #edf6ff 0%, #f8fbff 100%);
    }

    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--header-h);
      z-index: 1400;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px) saturate(150%);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 2px 10px rgba(0, 43, 89, 0.08);
    }

    .topbar-nav {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .nav-link {
      padding: 7px 12px;
      border-radius: 9px;
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--muted);
      text-decoration: none;
      border: 1px solid transparent;
      transition: background 0.18s ease, color 0.18s ease, border-color 0.18s ease;
    }

    .nav-link:hover {
      background: rgba(0, 114, 187, 0.09);
      color: var(--accent-dark);
      border-color: rgba(0, 114, 187, 0.2);
    }

    .nav-link.active {
      background: rgba(0, 114, 187, 0.12);
      color: var(--accent-dark);
      border-color: rgba(0, 114, 187, 0.3);
    }

    .brand {
      font-size: 0.95rem;
      font-weight: 800;
      color: var(--accent-dark);
      letter-spacing: -0.01em;
    }

    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid rgba(20, 184, 166, 0.28);
      background: rgba(20, 184, 166, 0.12);
      color: #0f766e;
      font-size: 0.78rem;
      font-weight: 700;
    }

    .status-chip .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #14b8a6;
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.35; transform: scale(0.75); }
    }

    #map {
      position: fixed;
      top: var(--header-h);
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 0;
    }

    .ride-panel {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 1450;
      width: min(360px, calc(100vw - 24px));
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .ride-panel-head {
      padding: 13px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .ride-panel-title {
      font-size: 0.84rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      color: var(--ink);
      text-transform: uppercase;
    }

    .ride-panel-body {
      padding: 14px;
      display: grid;
      gap: 10px;
    }

    .info-row {
      border: 1px solid rgba(0, 43, 89, 0.1);
      border-radius: 10px;
      background: #fff;
      padding: 10px 11px;
    }

    .label {
      display: block;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .value {
      font-size: 14px;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.35;
    }

    .value.secondary {
      color: var(--accent-dark);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-top: 2px;
    }

    .btn {
      height: 42px;
      border: 1.5px solid transparent;
      border-radius: 11px;
      font-family: var(--font);
      font-size: 0.86rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .btn:active { transform: translateY(1px); }

    .btn-end {
      color: #fff;
      border-color: #b91c1c;
      background: linear-gradient(180deg, #ef4444 0%, #dc2626 55%, #991b1b 100%);
      box-shadow: 0 5px 18px rgba(220, 38, 38, 0.3);
    }

    .btn-end:hover {
      box-shadow: 0 8px 20px rgba(220, 38, 38, 0.38);
      transform: translateY(-1px);
    }

    .small-note {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.4;
    }

    .legend {
      position: fixed;
      left: 16px;
      bottom: 16px;
      z-index: 1450;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--panel-bg);
      box-shadow: var(--shadow);
      padding: 10px 12px;
      display: grid;
      gap: 6px;
      min-width: 180px;
    }

    .legend-title {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 600;
    }

    .swatch {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .swatch-driver { background: #0ea5e9; }
    .swatch-passenger { background: #f97316; }

    @media (max-width: 740px) {
      .topbar { padding: 0 10px; }
      .status-chip { display: none; }
      .topbar-nav { display: none; }
      .ride-panel {
        left: 10px;
        right: 10px;
        width: auto;
        bottom: 10px;
      }
      .legend {
        left: 10px;
        top: calc(var(--header-h) + 10px);
        bottom: auto;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">USJ RideShare · My Map</div>
    <nav class="topbar-nav" aria-label="Primary navigation">
      <a class="nav-link" href="driver-map.html">Driver Map</a>
      <a class="nav-link" href="passenger-map.html">Passenger Map</a>
      <a class="nav-link active" href="my-map.html">My Map</a>
    </nav>
    <div class="status-chip"><span class="dot"></span><span id="liveStatusLabel">Live tracking</span></div>
  </header>

  <div id="map" role="main" aria-label="Active ride map"></div>

  <aside class="legend" aria-label="Markers legend">
    <div class="legend-title">Markers</div>
    <div class="legend-item"><span class="swatch swatch-driver"></span><span>Driver</span></div>
    <div class="legend-item"><span class="swatch swatch-passenger"></span><span>Passenger</span></div>
  </aside>

  <aside class="ride-panel" aria-label="Active ride details">
    <div class="ride-panel-head">
      <span class="ride-panel-title">Active Ride</span>
      <span id="roleBadge" class="status-chip" style="padding:5px 10px; font-size:0.72rem;">Role</span>
    </div>
    <div class="ride-panel-body">
      <div class="info-row">
        <span class="label">Ride Status</span>
        <div class="value" id="rideStatusText">Ride in progress</div>
      </div>
      <div class="info-row">
        <span class="label">Other Party</span>
        <div class="value" id="otherName">-</div>
        <div class="value secondary" id="otherPhone">-</div>
      </div>
      <div class="info-row" id="vehicleRow">
        <span class="label">Vehicle</span>
        <div class="value" id="otherCar">-</div>
        <div class="value secondary" id="otherPlate">-</div>
      </div>
      <div class="actions">
        <button type="button" class="btn btn-end" id="btnEndRide">End Ride</button>
      </div>
      <div class="small-note" id="trackingNote">Tracking your position with high accuracy.</div>
    </div>
  </aside>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const CAMPUS_LAT = 33.8654840;
    const CAMPUS_LNG = 35.5631210;
    const OSRM_BASE = 'https://router.project-osrm.org/route/v1/driving';
    const ACTIVE_RIDE_STORAGE_KEY = 'usj-rideshare-active-ride';
    const ACTIVE_RIDE_POSITIONS_KEY = 'usj-rideshare-active-ride-positions';
    const REQUEST_STORAGE_KEY = 'usj-rideshare-driver-requests';
    const JOIN_REQUEST_STORAGE_KEY = 'usj-rideshare-passenger-join-requests';
    const RIDE_PUBLISH_STORAGE_KEY = 'usj-rideshare-driver-published-rides';

    let map;
    let activeRide = null;
    let currentRole = 'passenger';
    let userMarker = null;
    let otherMarker = null;
    let routeLine = null;
    let watchId = null;
    let pollTimer = null;
    let lastRouteFetchAt = 0;

    function readJson(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        if (!raw) return fallback;
        const parsed = JSON.parse(raw);
        return parsed ?? fallback;
      } catch {
        return fallback;
      }
    }

    function writeJson(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    function getBackPage() {
      return currentRole === 'driver' ? 'driver-map.html' : 'passenger-map.html';
    }

    function getJoinRequestKeyLocal(request) {
      return request?.requestId || `${request?.driverId || 'driver'}|${request?.passengerPhone || 'phone'}|${request?.requestedAt || 'time'}`;
    }

    function isRideInProgress(status) {
      return status === 'in_progress' || status === 'in-progress';
    }

    function loadActiveRide() {
      const ride = readJson(ACTIVE_RIDE_STORAGE_KEY, null);
      if (!ride || !isRideInProgress(ride.status)) {
        window.location.href = getBackPage();
        return null;
      }
      return ride;
    }

    function getPickupPositionText() {
      if (currentRole !== 'passenger') return '';
      const points = Array.isArray(activeRide?.route?.pickupPoints) ? activeRide.route.pickupPoints : [];
      if (!points.length) return '';
      const meId = activeRide?.passenger?.id;
      const mePoint = points.find(point => point?.passengerId === meId);
      if (!mePoint) return '';
      return `Pickup #${mePoint.order || '?'} of ${points.length}`;
    }

    function renderActiveRide() {
      const passengerCount = Array.isArray(activeRide?.passengers) ? activeRide.passengers.length : (activeRide?.passenger ? 1 : 0);
      document.getElementById('rideStatusText').textContent = `Ride in progress · Passengers: ${passengerCount}`;
      document.getElementById('roleBadge').textContent = currentRole === 'driver' ? 'Driver' : 'Passenger';
      const other = currentRole === 'driver' ? activeRide.passenger : activeRide.driver;
      document.getElementById('otherName').textContent = other?.fullName || 'Unknown';
      document.getElementById('otherPhone').textContent = other?.phone || '-';

      const hasVehicle = Boolean(activeRide.driver?.carName || activeRide.driver?.licensePlate);
      const vehicleRow = document.getElementById('vehicleRow');
      if (hasVehicle) {
        vehicleRow.style.display = 'block';
        document.getElementById('otherCar').textContent = activeRide.driver?.carName || '-';
        document.getElementById('otherPlate').textContent = activeRide.driver?.licensePlate || '-';
      } else {
        vehicleRow.style.display = 'none';
      }

      const pickupText = getPickupPositionText();
      document.getElementById('trackingNote').textContent = currentRole === 'driver'
        ? 'Sharing your live location with passengers.'
        : (pickupText ? `${pickupText}. Sharing your live location with the driver.` : 'Sharing your live location with the driver.');
    }

    function makeCircleIcon(color) {
      return L.divIcon({
        className: '',
        html: `<svg width="28" height="28" viewBox="0 0 28 28"><circle cx="14" cy="14" r="10" fill="${color}" stroke="#ffffff" stroke-width="3"/><circle cx="14" cy="14" r="3" fill="#ffffff"/></svg>`,
        iconSize: [28, 28],
        iconAnchor: [14, 14],
      });
    }

    function initMap() {
      const centerLat = (currentRole === 'driver' ? activeRide.driver?.lat : activeRide.passenger?.lat) ?? CAMPUS_LAT;
      const centerLng = (currentRole === 'driver' ? activeRide.driver?.lng : activeRide.passenger?.lng) ?? CAMPUS_LNG;

      map = L.map('map', { zoomControl: false }).setView([centerLat, centerLng], 14);
      L.control.zoom({ position: 'bottomright' }).addTo(map);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap',
        maxZoom: 19,
      }).addTo(map);

      userMarker = L.marker([centerLat, centerLng], {
        icon: makeCircleIcon(currentRole === 'driver' ? '#0ea5e9' : '#f97316'),
        zIndexOffset: 200,
      }).addTo(map).bindTooltip('You', { direction: 'top', opacity: 0.95 });

      const other = currentRole === 'driver' ? activeRide.passenger : activeRide.driver;
      const otherLat = typeof other?.lat === 'number' ? other.lat : centerLat;
      const otherLng = typeof other?.lng === 'number' ? other.lng : centerLng;
      otherMarker = L.marker([otherLat, otherLng], {
        icon: makeCircleIcon(currentRole === 'driver' ? '#f97316' : '#0ea5e9'),
      }).addTo(map).bindTooltip(currentRole === 'driver' ? 'Passenger' : 'Driver', { direction: 'top', opacity: 0.95 });

      if (Array.isArray(activeRide.routeCoords) && activeRide.routeCoords.length > 1) {
        routeLine = L.polyline(activeRide.routeCoords, { color: '#0072bb', weight: 5, opacity: 0.8 }).addTo(map);
      }
    }

    function animateMarkerTo(marker, lat, lng, duration = 700) {
      if (!marker) return;
      const start = marker.getLatLng();
      const end = L.latLng(lat, lng);
      const t0 = performance.now();

      function step(now) {
        const t = Math.min((now - t0) / duration, 1);
        const eased = t * (2 - t);
        const curLat = start.lat + (end.lat - start.lat) * eased;
        const curLng = start.lng + (end.lng - start.lng) * eased;
        marker.setLatLng([curLat, curLng]);
        if (t < 1) requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }

    function getPositionsStore() {
      return readJson(ACTIVE_RIDE_POSITIONS_KEY, {});
    }

    function writePositionsStore(next) {
      writeJson(ACTIVE_RIDE_POSITIONS_KEY, next);
    }

    function updateOtherPartyMarker() {
      const store = getPositionsStore();
      const otherKey = currentRole === 'driver' ? 'passenger' : 'driver';
      const point = store?.[otherKey];
      if (!point || typeof point.lat !== 'number' || typeof point.lng !== 'number') return;
      animateMarkerTo(otherMarker, point.lat, point.lng, 800);
      if (currentRole === 'driver') {
        activeRide.passenger = { ...activeRide.passenger, lat: point.lat, lng: point.lng };
      } else {
        activeRide.driver = { ...activeRide.driver, lat: point.lat, lng: point.lng };
      }
    }

    async function updateRouteDisplay(force = false) {
      const storedRoute = Array.isArray(activeRide?.route?.coords)
        ? activeRide.route.coords
        : (Array.isArray(activeRide?.routeCoords) ? activeRide.routeCoords : []);
      if (storedRoute.length > 1) {
        if (routeLine) map.removeLayer(routeLine);
        routeLine = L.polyline(storedRoute, { color: '#0072bb', weight: 5, opacity: 0.86 }).addTo(map);
        return;
      }

      const now = Date.now();
      if (!force && now - lastRouteFetchAt < 10000) return;

      const driverPoint = currentRole === 'driver'
        ? userMarker.getLatLng()
        : otherMarker.getLatLng();
      const passengerPoint = currentRole === 'passenger'
        ? userMarker.getLatLng()
        : otherMarker.getLatLng();

      if (!driverPoint || !passengerPoint) return;
      lastRouteFetchAt = now;

      try {
        const url = `${OSRM_BASE}/${driverPoint.lng},${driverPoint.lat};${passengerPoint.lng},${passengerPoint.lat}?overview=full&geometries=geojson`;
        const res = await fetch(url);
        if (!res.ok) throw new Error('route failed');
        const data = await res.json();
        if (!Array.isArray(data.routes) || !data.routes.length) throw new Error('route missing');
        const coords = data.routes[0].geometry.coordinates.map(point => [point[1], point[0]]);
        if (routeLine) map.removeLayer(routeLine);
        routeLine = L.polyline(coords, { color: '#0072bb', weight: 5, opacity: 0.86 }).addTo(map);
        activeRide.routeCoords = coords;
      } catch {
        const fallback = [
          [driverPoint.lat, driverPoint.lng],
          [passengerPoint.lat, passengerPoint.lng],
        ];
        if (routeLine) map.removeLayer(routeLine);
        routeLine = L.polyline(fallback, { color: '#0072bb', weight: 4, opacity: 0.6, dashArray: '6 6' }).addTo(map);
      }
    }

    function publishCurrentPosition(lat, lng) {
      const store = getPositionsStore();
      const key = currentRole;
      const next = {
        ...store,
        rideId: activeRide.rideId,
        [key]: {
          lat,
          lng,
          updatedAt: new Date().toISOString(),
        },
      };
      writePositionsStore(next);
    }

    function updateUserPosition(position) {
      const lat = position.coords.latitude;
      const lng = position.coords.longitude;
      const accuracy = Math.round(position.coords.accuracy || 0);
      animateMarkerTo(userMarker, lat, lng, 700);
      publishCurrentPosition(lat, lng);

      if (currentRole === 'driver') {
        activeRide.driver = { ...activeRide.driver, lat, lng };
      } else {
        activeRide.passenger = { ...activeRide.passenger, lat, lng };
      }
      document.getElementById('liveStatusLabel').textContent = `Live ${accuracy}m`;
      updateOtherPartyMarker();
      updateRouteDisplay();
    }

    function startLiveTracking() {
      if (!navigator.geolocation) {
        document.getElementById('trackingNote').textContent = 'Geolocation unavailable in this browser.';
        return;
      }
      if (watchId !== null) return;

      watchId = navigator.geolocation.watchPosition(
        updateUserPosition,
        err => {
          document.getElementById('trackingNote').textContent = `Location error: ${err.message}`;
        },
        { enableHighAccuracy: true, timeout: 12000, maximumAge: 0 }
      );

      pollTimer = window.setInterval(() => {
        updateOtherPartyMarker();
        updateRouteDisplay();
      }, 1800);
    }

    function stopLiveTracking() {
      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }
      if (pollTimer !== null) {
        clearInterval(pollTimer);
        pollTimer = null;
      }
    }

    function markSourceRideCompleted() {
      const sourceType = activeRide.sourceType;
      const sourceRequestId = activeRide.sourceRequestId;
      if (!sourceRequestId) return;

      if (sourceType === 'carpool-published-ride') {
        const rides = readJson(RIDE_PUBLISH_STORAGE_KEY, []);
        const updated = rides.map(ride => {
          if (ride?.rideId !== sourceRequestId) return ride;
          return {
            ...ride,
            status: 'completed',
            completedAt: new Date().toISOString(),
          };
        });
        writeJson(RIDE_PUBLISH_STORAGE_KEY, updated.slice(-40));
        return;
      }

      if (sourceType === 'join-request' || sourceType === 'join-update') {
        const joinRequests = readJson(JOIN_REQUEST_STORAGE_KEY, []);
        const updated = joinRequests.map(request => {
          const key = getJoinRequestKeyLocal(request);
          if (request?.requestId !== sourceRequestId && key !== sourceRequestId) return request;
          return {
            ...request,
            status: 'completed',
            completedAt: new Date().toISOString(),
          };
        });
        writeJson(JOIN_REQUEST_STORAGE_KEY, updated.slice(-20));
      } else {
        const driverRequests = readJson(REQUEST_STORAGE_KEY, []);
        const updated = driverRequests.map(request => {
          if (request?.requestId !== sourceRequestId) return request;
          return {
            ...request,
            status: 'completed',
            completedAt: new Date().toISOString(),
          };
        });
        writeJson(REQUEST_STORAGE_KEY, updated.slice(-20));
      }
    }

    function endRideAndReturn() {
      stopLiveTracking();
      markSourceRideCompleted();
      localStorage.removeItem(ACTIVE_RIDE_STORAGE_KEY);
      localStorage.removeItem(ACTIVE_RIDE_POSITIONS_KEY);
      window.location.href = getBackPage();
    }

    function fitEverything() {
      const points = [];
      if (userMarker) points.push(userMarker.getLatLng());
      if (otherMarker) points.push(otherMarker.getLatLng());
      if (routeLine) {
        map.fitBounds(routeLine.getBounds(), { padding: [56, 56] });
        return;
      }
      if (points.length >= 2) {
        map.fitBounds(L.latLngBounds(points), { padding: [56, 56] });
      }
    }

    function init() {
      activeRide = loadActiveRide();
      if (!activeRide) return;
      currentRole = activeRide.role === 'driver' ? 'driver' : 'passenger';

      renderActiveRide();
      initMap();
      startLiveTracking();
      updateOtherPartyMarker();
      updateRouteDisplay(true).finally(fitEverything);

      document.getElementById('btnEndRide').addEventListener('click', endRideAndReturn);

      window.addEventListener('storage', event => {
        if (event.key === ACTIVE_RIDE_STORAGE_KEY) {
          const latest = readJson(ACTIVE_RIDE_STORAGE_KEY, null);
          if (!latest || !isRideInProgress(latest.status)) {
            stopLiveTracking();
            window.location.href = getBackPage();
            return;
          }
          activeRide = latest;
          renderActiveRide();
        }
        if (event.key === ACTIVE_RIDE_POSITIONS_KEY) {
          updateOtherPartyMarker();
          updateRouteDisplay();
        }
      });

      window.addEventListener('beforeunload', () => {
        stopLiveTracking();
      });
    }

    init();
  </script>
</body>
</html>
